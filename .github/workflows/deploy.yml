name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

env:
  APP_NAME: kubeclass-web
  IMAGE_NAME: kubeclass-web-lab
  IMAGE_TAG: ${{ github.sha }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/kubeclass-web-lab:${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Run tests
        run: GOCACHE=/tmp/go-build-cache go test ./...

      - name: Build binary
        run: |
          mkdir -p bin
          go build -o ./bin/${APP_NAME} ./cmd/${APP_NAME}

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  deploy-remote:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image tarball
        run: |
          docker pull ${{ env.IMAGE }}
          docker save ${{ env.IMAGE }} | gzip > kubeclass-web-lab.tar.gz

      - name: Copy image to remote host
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: kubeclass-web-lab.tar.gz
          target: /home/${{ secrets.REMOTE_USER }}/kubeclass-web-lab.tar.gz

      - name: Import image and rollout deployment (remote)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            sudo /usr/local/bin/k3s ctr images import /home/${{ secrets.REMOTE_USER }}/kubeclass-web-lab.tar.gz
            kubectl rollout restart deployment/kubeclass-web -n platform
            kubectl rollout status deployment/kubeclass-web -n platform
            kubectl get pods -n platform
