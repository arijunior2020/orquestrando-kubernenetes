name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

env:
  APP_NAME: kubeclass-web
  IMAGE_NAME: kubeclass-web-lab
  IMAGE_TAG: ${{ github.sha }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/kubeclass-web-lab:${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Run tests
        run: GOCACHE=/tmp/go-build-cache go test ./...

      - name: Build binary
        run: |
          mkdir -p bin
          go build -o ./bin/${APP_NAME} ./cmd/${APP_NAME}

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push container image
        run: |
          docker build -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

  deploy-remote:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR for deploy-remote
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Prepare image tarball
        run: |
          docker pull ${{ env.IMAGE }}
          docker save ${{ env.IMAGE }} | gzip > kubeclass-web-lab.tar.gz

      - name: Prepare platform manifests tarball
        run: |
          tar -czf kubeclass-web-platform.tar.gz -C deploy/k8s platform

      - name: Setup SSH for remote deploy
        run: |
          if [ -z "${{ secrets.REMOTE_HOST }}" ]; then
            echo "ERROR: REMOTE_HOST is not set. Configure the secret REMOTE_HOST with the remote VM IP/hostname." >&2
            exit 1
          fi
          if [ -z "${{ secrets.REMOTE_USER }}" ]; then
            echo "ERROR: REMOTE_USER is not set. Configure the secret REMOTE_USER with the remote SSH user." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "[INFO] REMOTE_HOST is set; REMOTE_USER is set" >&2
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/kubeclass-pilot-key.pem
          chmod 600 ~/.ssh/kubeclass-pilot-key.pem
          ssh-keyscan -H "${{ secrets.REMOTE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || {
            echo "WARNING: ssh-keyscan failed for ${REMOTE_HOST}; continuing with StrictHostKeyChecking=no." >&2
          }

      - name: Test SSH connectivity
        run: |
          echo "Testing SSH connectivity to ${{ secrets.REMOTE_HOST }}..."
          ssh -i ~/.ssh/kubeclass-pilot-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "echo 'SSH connection successful'" || {
            echo "ERROR: Cannot connect to remote host ${{ secrets.REMOTE_HOST }} via SSH. Check:" >&2
            echo "  - Is the EC2 instance running?" >&2
            echo "  - Is the public IP correct in REMOTE_HOST secret?" >&2
            echo "  - Is port 22 open in the security group (allow from 0.0.0.0/0)?" >&2
            echo "  - Does the instance have a public IP assigned?" >&2
            echo "  - Is the SSH_PRIVATE_KEY correct and matches the public key on the VM?" >&2
            exit 1
          }

      - name: Copy image to remote host
        run: |
          scp -i ~/.ssh/kubeclass-pilot-key.pem -o StrictHostKeyChecking=no kubeclass-web-lab.tar.gz ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/home/${{ secrets.REMOTE_USER }}/kubeclass-web-lab.tar.gz

      - name: Copy platform manifests to remote host
        run: |
          scp -i ~/.ssh/kubeclass-pilot-key.pem -o StrictHostKeyChecking=no kubeclass-web-platform.tar.gz ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/home/${{ secrets.REMOTE_USER }}/kubeclass-web-platform.tar.gz

      - name: Import image and update deployment (remote)
        run: |
          ssh -i ~/.ssh/kubeclass-pilot-key.pem -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "\
            sudo /usr/local/bin/k3s ctr images import /home/${{ secrets.REMOTE_USER }}/kubeclass-web-lab.tar.gz && \
            rm -rf /tmp/kubeclass-web-platform && \
            mkdir -p /tmp/kubeclass-web-platform && \
            tar -xzf /home/${{ secrets.REMOTE_USER }}/kubeclass-web-platform.tar.gz -C /tmp/kubeclass-web-platform && \
            kubectl apply -k /tmp/kubeclass-web-platform/platform && \
            kubectl set image deployment/kubeclass-web -n platform kubeclass-web=${{ env.IMAGE }} && \
            kubectl set env deployment/kubeclass-web -n platform TOOLBOX_IMAGE=${{ env.IMAGE }} && \
            kubectl annotate deployment/kubeclass-web -n platform app.kubernetes.io/version=${{ github.sha }} --overwrite && \
            kubectl rollout status deployment/kubeclass-web -n platform && \
            kubectl get deployment kubeclass-web -n platform -o jsonpath='{.spec.template.spec.containers[0].image}{\"\n\"}' && \
            kubectl get deployment kubeclass-web -n platform -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name==\"TOOLBOX_IMAGE\")].value}{\"\n\"}' && \
            kubectl auth can-i delete namespaces --as=system:serviceaccount:platform:kubeclass-web && \
            kubectl get pods -n platform"
